<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>New Form Submission</title>
    <style>
      body {
        font-family: system-ui, -apple-system, sans-serif;
        max-width: 600px;
        margin: 2rem auto;
        padding: 0 1rem;
        color: #1a1a1a;
        line-height: 1.5;
      }
      h1 {
        margin-top: 0;
      }
      .meta {
        color: #666;
        font-size: 0.9rem;
        margin-bottom: 1.5rem;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 1rem;
      }
      th,
      td {
        text-align: left;
        padding: 0.5rem 0.75rem;
        border-bottom: 1px solid #e5e7eb;
      }
      th {
        color: #666;
        font-weight: 500;
        width: 30%;
      }
      .token {
        margin-top: 1.5rem;
        padding: 0.75rem;
        background: #f3f4f6;
        border-radius: 6px;
        font-family: monospace;
        font-size: 0.85rem;
        word-break: break-all;
      }
    </style>
  </head>
  <body>
    <h1>New Form Submission</h1>
    <p class="meta">
      Form: {{ form_id }} &middot; Submitted at: {{ submitted_at }}
    </p>

    <table>
      <tr>
        <th>Name</th>
        <td>{{ name }}</td>
      </tr>
      <tr>
        <th>Email</th>
        <td>{{ email }}</td>
      </tr>
    </table>

    <div class="token">Submission token: {{ submission_token }}</div>
  </body>
</html>
